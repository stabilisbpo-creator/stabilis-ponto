<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Ponto</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 420px; overflow: hidden; }
  .header { background: #1a365d; color: #fff; padding: 1.5rem 1.75rem 1.25rem; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .clock { font-size: 36px; font-weight: 700; letter-spacing: -1px; margin-top: 12px; font-variant-numeric: tabular-nums; }
  .date-str { font-size: 13px; opacity: 0.6; margin-top: 2px; }
  .body { padding: 1.5rem 1.75rem; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .funcionario-box { padding: 10px 12px; border: 1.5px solid #c3dafe; border-radius: 8px; font-size: 15px; font-weight: 600; color: #1a365d; background: #ebf4ff; display: flex; align-items: center; gap: 8px; }
  .sem-funcionario { padding: 10px 12px; border: 1.5px dashed #fc8181; border-radius: 8px; font-size: 13px; color: #9b2c2c; background: #fff5f5; }
  .feriado-banner { padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; background: #fffbeb; border: 1px solid #f6ad55; color: #744210; margin-bottom: 1rem; display: none; align-items: center; gap: 8px; }
  .feriado-banner.visivel { display: flex; }
  .status-atual { padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .status-atual.aguardando-entrada { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
  .status-atual.aguardando-saida { background: #fff5f5; color: #9b2c2c; border: 1px solid #fc8181; }
  .status-atual.carregando { background: #f7fafc; color: #718096; border: 1px solid #e2e8f0; }
  textarea, input[type="datetime-local"] { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #1a202c; background: #f7fafc; transition: border-color 0.2s; font-family: inherit; }
  textarea { resize: none; height: 72px; }
  textarea:focus, input:focus { outline: none; border-color: #1a365d; background: #fff; }
  .tipo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tipo-btn { padding: 14px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; background: #f7fafc; font-size: 14px; font-weight: 500; color: #4a5568; cursor: pointer; text-align: center; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .tipo-btn:hover:not([disabled]) { border-color: #1a365d; color: #1a365d; }
  .tipo-btn[disabled] { opacity: 0.35; cursor: not-allowed; background: #edf2f7; pointer-events: none; }
  .tipo-btn.entrada.selected { background: #f0fff4; border-color: #276749; color: #276749; font-weight: 600; }
  .tipo-btn.saida.selected { background: #fff5f5; border-color: #9b2c2c; color: #9b2c2c; font-weight: 600; }
  .hint { font-size: 12px; color: #718096; margin-top: 6px; }
  .registros-recentes { margin-top: 1.25rem; border-top: 1px solid #e2e8f0; padding-top: 1rem; }
  .registros-recentes h3 { font-size: 12px; font-weight: 600; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .registro-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
  .registro-item .reg-info { flex: 1; color: #2d3748; }
  .registro-item .reg-tipo { font-weight: 600; color: #1a365d; }
  .registro-item .reg-ajustado { font-size: 11px; color: #d69e2e; font-weight: 600; margin-left: 4px; }
  .btn-ajuste { border: 1px solid #c3dafe; background: #ebf4ff; color: #2c5282; font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .btn-ajuste:hover { background: #d6e4ff; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; padding: 1rem; z-index: 10; }
  .modal-overlay.aberto { display: flex; }
  .modal-box { background: #fff; border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 380px; }
  .modal-box h3 { font-size: 16px; color: #1a365d; margin-bottom: 4px; }
  .modal-box .modal-sub { font-size: 13px; color: #718096; margin-bottom: 1rem; }
  .modal-box .field { margin-bottom: 12px; }
  .modal-box input, .modal-box textarea { width: 100%; padding: 9px 11px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: inherit; }
  .modal-box textarea { resize: none; height: 64px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1rem; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
  .modal-cancelar { background: #f7fafc; color: #4a5568; border: 1px solid #e2e8f0 !important; }
  .modal-confirmar { background: #1a365d; color: #fff; }
  .submit-btn { width: 100%; padding: 13px; background: #1a365d; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .submit-btn:hover { background: #2d4e8a; }
  .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .status-msg { margin-top: 1rem; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
  .status-msg.ok { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; display: block; }
  .status-msg.erro { background: #fff5f5; color: #9b2c2c; border: 1px solid #fc8181; display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1><i class="ti ti-clock"></i> Registro de Ponto</h1>
    <p id="nomeEmpresa">Carregando...</p>
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-str" id="datestr">carregando...</div>
  </div>
  <div class="body">
    <div class="field">
      <label><i class="ti ti-user"></i> Funcionário</label>
      <div id="funcionario-display"></div>
    </div>

    <!-- Banner de feriado (aparece automaticamente se hoje for feriado) -->
    <div class="feriado-banner" id="feriadoBanner">
      <i class="ti ti-calendar-event"></i>
      <span id="feriadoTexto">Hoje é feriado.</span>
    </div>

    <div class="status-atual carregando" id="statusAtual">
      <i class="ti ti-loader"></i> Verificando último registro...
    </div>
    <div class="field">
      <label>Tipo de registro</label>
      <div class="tipo-grid">
        <div class="tipo-btn entrada" id="btnEntrada" data-tipo="Entrada" onclick="selecionarTipo(this)">
          <i class="ti ti-login"></i> Entrada
        </div>
        <div class="tipo-btn saida" id="btnSaida" data-tipo="Saída" onclick="selecionarTipo(this)">
          <i class="ti ti-logout"></i> Saída
        </div>
      </div>
    </div>
    <p class="hint" style="margin-bottom:1rem;">O registro sempre usa o horário atual deste dispositivo. Se marcar errado, use "Pedir ajuste" abaixo.</p>
    <button class="submit-btn" id="btnRegistrar" onclick="registrar()">
      <i class="ti ti-check"></i> Registrar ponto
    </button>
    <div class="status-msg" id="statusMsg"></div>

    <div class="registros-recentes" id="registrosRecentes" style="display:none;">
      <h3><i class="ti ti-history"></i> Meus últimos registros</h3>
      <div id="listaRegistros"></div>
    </div>
  </div>
</div>

<!-- MODAL — PEDIR AJUSTE -->
<div class="modal-overlay" id="modalAjuste">
  <div class="modal-box">
    <h3><i class="ti ti-edit"></i> Pedir ajuste</h3>
    <p class="modal-sub" id="modalOriginal">Registro original: --</p>
    <div class="field">
      <label>Horário correto</label>
      <input type="time" id="ajusteHora">
    </div>
    <div class="field">
      <label>Data (só mude se for de outro dia)</label>
      <input type="date" id="ajusteData">
    </div>
    <div class="field">
      <label>Motivo (obrigatório)</label>
      <textarea id="ajusteMotivo" placeholder="Ex: passei no médico de manhã e cheguei antes do que marquei"></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-cancelar" onclick="fecharModalAjuste()">Cancelar</button>
      <button class="modal-confirmar" onclick="enviarAjuste()">Enviar pedido</button>
    </div>
  </div>
</div>

<script>
// =============================================
// CONFIGURAÇÃO — atualize após reimplantar
// =============================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKH_uB7jMTINsI_KGZ-e4xoZn0m0cKsP_x5JZzHkt4RmZzCR9pN2E2aXIDsQWIdQp4aQ/exec";

// Nome da empresa (aparece no cabeçalho)
const NOME_EMPRESA = "Stabilis BPO";

let tipoSelecionado = "";

const params = new URLSearchParams(window.location.search);
const nomeFuncionario = params.get("funcionario") || "";
const chaveStorage = "ponto_" + nomeFuncionario;

document.getElementById("nomeEmpresa").textContent = NOME_EMPRESA;

// Exibe nome
const displayEl = document.getElementById("funcionario-display");
if (nomeFuncionario) {
  displayEl.innerHTML = `<div class="funcionario-box"><i class="ti ti-user-check"></i>${nomeFuncionario}</div>`;
} else {
  displayEl.innerHTML = `<div class="sem-funcionario">⚠️ Funcionário não identificado. Acesse pelo link correto fornecido pela empresa.</div>`;
  document.getElementById("btnRegistrar").disabled = true;
  document.getElementById("statusAtual").style.display = "none";
}

// =============================================
// RELÓGIO
// =============================================
function atualizarRelogio() {
  const agora = new Date();
  document.getElementById("clock").textContent = agora.toLocaleTimeString("pt-BR");
  const dias = ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"];
  const meses = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  document.getElementById("datestr").textContent =
    dias[agora.getDay()] + ", " + agora.getDate() + " de " + meses[agora.getMonth()] + " de " + agora.getFullYear();
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

// =============================================
// FERIADOS — verifica se hoje é feriado
// =============================================
function dataHojeStr() {
  const hoje = new Date();
  const d = String(hoje.getDate()).padStart(2,"0");
  const m = String(hoje.getMonth()+1).padStart(2,"0");
  return `${d}/${m}/${hoje.getFullYear()}`;
}

async function verificarFeriado() {
  if (!nomeFuncionario) return;
  try {
    const r = await fetch(SCRIPT_URL + "?action=feriados");
    const data = await r.json();
    const hoje = dataHojeStr();
    const feriado = (data.feriados || []).find(f => f.data === hoje);
    if (feriado) {
      const textos = {
        feriado: `🎉 Hoje é feriado: ${feriado.descricao || "feriado"}. Registro possível, mas será marcado como hora extra.`,
        folga_compensatoria: `🏖️ Hoje é folga compensatória: ${feriado.descricao || ""}. Não há jornada esperada.`,
        ponto_facultativo: `📋 Hoje é ponto facultativo: ${feriado.descricao || ""}. Verifique com a empresa.`
      };
      document.getElementById("feriadoTexto").textContent = textos[feriado.tipo] || textos.feriado;
      document.getElementById("feriadoBanner").classList.add("visivel");
    }
  } catch(e) {
    // silencioso — não bloqueia o app
  }
}

verificarFeriado();

// =============================================
// ESTADO LOCAL (localStorage)
// =============================================
function salvarEstadoLocal(tipo, data) {
  localStorage.setItem(chaveStorage, JSON.stringify({ ultimoTipo: tipo, ultimaData: data }));
}

function lerEstadoLocal() {
  try {
    const raw = localStorage.getItem(chaveStorage);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// =============================================
// APLICAR ESTADO NA TELA
// =============================================
function aplicarEstado(proximoTipo, ultimaData) {
  const statusEl = document.getElementById("statusAtual");
  const btnEntrada = document.getElementById("btnEntrada");
  const btnSaida = document.getElementById("btnSaida");
  const hoje = new Date().toLocaleDateString("pt-BR");

  if (proximoTipo === "Saída") {
    statusEl.className = "status-atual aguardando-saida";
    statusEl.innerHTML = `<i class="ti ti-door-exit"></i> Aguardando <strong>&nbsp;Saída</strong>`;
    btnSaida.removeAttribute("disabled");
    btnEntrada.setAttribute("disabled", "true");
  } else {
    statusEl.className = "status-atual aguardando-entrada";
    statusEl.innerHTML = `<i class="ti ti-circle-check"></i> Aguardando <strong>&nbsp;Entrada</strong>`;
    btnEntrada.removeAttribute("disabled");
    btnSaida.setAttribute("disabled", "true");
  }

  document.querySelectorAll(".tipo-btn").forEach(b => b.classList.remove("selected"));
  tipoSelecionado = "";
}

// =============================================
// INICIALIZAR
// =============================================
function inicializar() {
  if (!nomeFuncionario) return;

  const local = lerEstadoLocal();
  if (local) {
    const proximoTipo = local.ultimoTipo === "Entrada" ? "Saída" : "Entrada";
    aplicarEstado(proximoTipo, local.ultimaData);
  }

  fetch(SCRIPT_URL + "?action=ultimoRegistro&funcionario=" + encodeURIComponent(nomeFuncionario))
    .then(r => r.json())
    .then(data => {
      aplicarEstado(data.proximoTipo, data.ultimaData);
      if (data.ultimoTipo) salvarEstadoLocal(data.ultimoTipo, data.ultimaData);
    })
    .catch(() => {
      if (!local) aplicarEstado("Entrada", null);
    });
}

inicializar();

// =============================================
// SELECIONAR TIPO
// =============================================
function selecionarTipo(el) {
  if (el.hasAttribute("disabled")) return;
  document.querySelectorAll(".tipo-btn").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  tipoSelecionado = el.getAttribute("data-tipo");
}

// =============================================
// REGISTRAR PONTO — sempre usa o horário real do dispositivo
// =============================================
async function registrar() {
  const btn = document.getElementById("btnRegistrar");

  if (!tipoSelecionado) { mostrarStatus("erro", "Selecione o tipo de registro."); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Verificando...';

  // Confere com o servidor, na hora do clique, se esse ainda é o tipo esperado.
  // Evita duplicar Entrada/Saída quando a pessoa usa mais de um dispositivo
  // ou deixa a aba aberta de um dia pro outro sem recarregar.
  try {
    const r = await fetch(SCRIPT_URL + "?action=ultimoRegistro&funcionario=" + encodeURIComponent(nomeFuncionario));
    const check = await r.json();
    if (check.proximoTipo && check.proximoTipo !== tipoSelecionado) {
      aplicarEstado(check.proximoTipo, check.ultimaData);
      if (check.ultimoTipo) salvarEstadoLocal(check.ultimoTipo, check.ultimaData);
      mostrarStatus("erro", `Seu último registro já foi atualizado — a tela foi corrigida. Confira e tente de novo.`);
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-check"></i> Registrar ponto';
      return;
    }
  } catch(e) {
    // se a checagem falhar, segue com o valor local mesmo (não bloqueia o funcionário)
  }

  btn.innerHTML = '<i class="ti ti-loader"></i> Enviando...';

  const agora = new Date();
  const dataHora = { data: agora.toLocaleDateString("pt-BR"), hora: agora.toLocaleTimeString("pt-BR") };
  const tipoEnviado = tipoSelecionado;

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "registrar",
        funcionario: nomeFuncionario,
        tipo: tipoEnviado,
        data: dataHora.data,
        hora: dataHora.hora
      })
    });

    salvarEstadoLocal(tipoEnviado, dataHora.data);
    const proximoTipo = tipoEnviado === "Entrada" ? "Saída" : "Entrada";
    aplicarEstado(proximoTipo, dataHora.data);

    mostrarStatus("ok", "✓ Ponto registrado com sucesso às " + dataHora.hora);
    setTimeout(carregarUltimosRegistros, 800);

  } catch(e) {
    mostrarStatus("erro", "Erro ao registrar. Verifique sua conexão.");
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-check"></i> Registrar ponto';
}

function mostrarStatus(tipo, texto) {
  const msg = document.getElementById("statusMsg");
  msg.className = "status-msg " + tipo;
  msg.textContent = texto;
}

// =============================================
// MEUS ÚLTIMOS REGISTROS + PEDIR AJUSTE
// =============================================
let registroSelecionado = null;

async function carregarUltimosRegistros() {
  if (!nomeFuncionario) return;
  try {
    const r = await fetch(SCRIPT_URL + "?action=ultimosRegistros&funcionario=" + encodeURIComponent(nomeFuncionario));
    const data = await r.json();
    renderRegistros(data.registros || []);
  } catch(e) {
    // silencioso — não bloqueia o registro principal
  }
}

function renderRegistros(lista) {
  const wrap = document.getElementById("registrosRecentes");
  const el = document.getElementById("listaRegistros");

  if (!lista.length) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";

  el.innerHTML = lista.map(r => `
    <div class="registro-item">
      <div class="reg-info">
        <span class="reg-tipo">${r.tipo}</span> — ${r.data} às ${r.hora}
        ${r.ajustado ? '<span class="reg-ajustado">ajustado p/ ' + r.horaEfetiva + '</span>' : ''}
      </div>
      <button class="btn-ajuste" onclick='abrirModalAjuste(${JSON.stringify(r)})'>Pedir ajuste</button>
    </div>
  `).join("");
}

function abrirModalAjuste(registro) {
  registroSelecionado = registro;
  document.getElementById("modalOriginal").textContent =
    `Registro original: ${registro.tipo} — ${registro.data} às ${registro.hora}`;

  const [d, m, y] = registro.data.split("/");
  document.getElementById("ajusteData").value = `${y}-${m}-${d}`;
  document.getElementById("ajusteHora").value = registro.hora.slice(0,5);
  document.getElementById("ajusteMotivo").value = "";
  document.getElementById("modalAjuste").classList.add("aberto");
}

function fecharModalAjuste() {
  document.getElementById("modalAjuste").classList.remove("aberto");
  registroSelecionado = null;
}

async function enviarAjuste() {
  if (!registroSelecionado) return;

  const novaData = document.getElementById("ajusteData").value;
  const novaHora = document.getElementById("ajusteHora").value;
  const motivo = document.getElementById("ajusteMotivo").value.trim();

  if (!novaData || !novaHora) { alert("Preencha data e hora."); return; }
  if (!motivo) { alert("Preencha o motivo do ajuste."); return; }

  const btnEnviar = document.querySelector("#modalAjuste .modal-confirmar");
  if (btnEnviar.disabled) return; // já está enviando, ignora clique repetido
  btnEnviar.disabled = true;
  btnEnviar.textContent = "Enviando...";

  const [y, m, d] = novaData.split("-");
  const dataFormatada = `${d}/${m}/${y}`;
  const horaFormatada = novaHora + ":00";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "pedirAjuste",
        registroId: registroSelecionado.id,
        funcionario: nomeFuncionario,
        dataOriginal: registroSelecionado.data,
        horaOriginal: registroSelecionado.hora,
        dataSolicitada: dataFormatada,
        horaSolicitada: horaFormatada,
        motivo
      })
    });

    fecharModalAjuste();
    mostrarStatus("ok", "✓ Pedido de ajuste enviado. Aguardando aprovação.");
  } catch(e) {
    alert("Erro ao enviar pedido. Tente novamente.");
  }

  btnEnviar.disabled = false;
  btnEnviar.textContent = "Enviar pedido";
}

carregarUltimosRegistros();
</script>
</body>
</html>
